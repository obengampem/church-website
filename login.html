<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Holy Ghost Triumphant Ministries — Login</title>
  <link rel="icon" href="media/logo.png" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Cinzel:wght@400;500;600&family=EB+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet" />
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'EB Garamond', serif;
      background: linear-gradient(135deg, #2356a8 0%, #d4a017 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .login-container {
      width: 100%;
      max-width: 420px;
      background: white;
      border-radius: 24px;
      padding: 48px 36px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
    }

    .login-header {
      text-align: center;
      margin-bottom: 40px;
    }

    .login-logo {
      width: 120px;
      height: 120px;
      margin: 0 auto 20px;
      object-fit: contain;
    }

    .login-header h1 {
      margin: 0;
      font-size: 2rem;
      color: #2356a8;
    }

    .login-header p {
      margin: 8px 0 0;
      color: #5b6771;
      font-size: 0.95rem;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #1f2733;
      font-weight: 500;
      font-size: 0.95rem;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid #d0d0d0;
      border-radius: 8px;
      font-family: inherit;
      font-size: 1rem;
      transition: border-color 0.2s ease;
    }

    input[type="text"]:focus,
    input[type="password"]:focus {
      outline: none;
      border-color: #2356a8;
      box-shadow: 0 0 0 3px rgba(35, 86, 168, 0.1);
    }

    .login-button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #2356a8, #d4a017);
      color: white;
      border: none;
      border-radius: 8px;
      font-family: inherit;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: transform 0.2s ease;
      margin-top: 10px;
    }

    .login-button:hover {
      transform: translateY(-2px);
    }

    .error-message {
      color: #d32f2f;
      font-size: 0.9rem;
      margin-top: 12px;
      display: none;
      text-align: center;
    }

    .error-message.show {
      display: block;
    }

    @media (max-width: 600px) {
      .login-container {
        padding: 32px 24px;
      }

      .login-header h1 {
        font-size: 1.6rem;
      }

      .login-logo {
        width: 100px;
        height: 100px;
      }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-header">
      <img src="media/logo.png" alt="Holy Ghost Triumphant Logo" class="login-logo" />
      <h1>Holy Ghost Triumphant</h1>
      <p>Church Management System</p>
    </div>

    <form id="loginForm">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="Enter your username" required />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter your password" required />
      </div>
      <button type="submit" class="login-button">Login</button>
      <div class="error-message" id="errorMessage"></div>
    </form>
  </div>

  <script>
    const CREDENTIALS = {
      admin: { password: 'admin@hgtm', role: 'administrator' },
      pastor: { password: 'pastor@hgtm', role: 'pastor' },
      developer: { password: 'dev@hgtm', role: 'developer' }
    };

    const REDIRECTS = {
      administrator: 'administrator/',
      pastor: 'pastor/',
      developer: 'developer/'
    };

    document.getElementById('loginForm').addEventListener('submit', handleLogin);

    function handleLogin(e) {
      e.preventDefault();
      const username = document.getElementById('username').value.toLowerCase();
      const password = document.getElementById('password').value;
      const errorElement = document.getElementById('errorMessage');

      if (CREDENTIALS[username] && CREDENTIALS[username].password === password) {
        const role = CREDENTIALS[username].role;
        localStorage.setItem('userRole', role);
        localStorage.setItem('loggedIn', 'true');
        localStorage.setItem('loginTime', new Date().getTime());
        window.location.href = REDIRECTS[role];
      } else {
        errorElement.textContent = 'Invalid username or password.';
        errorElement.classList.add('show');
        setTimeout(() => {
          errorElement.classList.remove('show');
        }, 3000);
      }
    }
  </script>
</body>
</html>
